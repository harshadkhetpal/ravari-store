name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 65002
        command_timeout: 10m
        script: |
          source ~/.bashrc 2>/dev/null || true
          source ~/.profile 2>/dev/null || true
          source ~/.nvm/nvm.sh 2>/dev/null || true
          export PATH=$PATH:/usr/local/bin:$HOME/.npm-global/bin:$HOME/.local/bin

          cd /home/${{ secrets.HOSTINGER_USER }}/nodejs

          echo "=== Pulling latest code ==="
          git pull origin main

          echo "=== Building frontend ==="
          cd frontend
          npm install
          CI=false npm run build
          cd ..

          echo "=== Restarting server ==="
          pm2 restart all 2>/dev/null || \
          pm2 start backend/server.js --name ravari 2>/dev/null || \
          (pkill -f "node" || true; sleep 1; nohup node backend/server.js > app.log 2>&1 & echo "PID: $!")

          echo "=== Done! ==="

name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        CI=false npm run build

    - name: Clear old build from server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 65002
        script: rm -rf /home/${{ secrets.HOSTINGER_USER }}/nodejs/frontend/build

    - name: Upload new build to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 65002
        source: "frontend/build"
        target: "/home/${{ secrets.HOSTINGER_USER }}/nodejs/frontend/"

    - name: Restart Node App
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 65002
        script: |
          cd /home/${{ secrets.HOSTINGER_USER }}/nodejs
          pm2 list
          pm2 stop all || true
          pm2 delete all || true
          pm2 start server.js --name ravari-store
          pm2 save
          echo "Node app restarted with fresh process"
          pm2 list

    - name: Done
      if: success()
      run: echo "Live at https://ravari.in"

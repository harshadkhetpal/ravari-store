name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        CI=false npm run build

    - name: Copy built files to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 65002
        source: "frontend/build/*"
        target: "/home/${{ secrets.HOSTINGER_USER }}/public_html/ravari-store/frontend/build/"
        strip_components: 2

    - name: Restart server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 65002
        script: |
          cd /home/${{ secrets.HOSTINGER_USER }}/public_html/ravari-store
          pm2 restart ravari-store || pm2 start server.js --name ravari-store
          echo "Deployment complete!"

    - name: Success
      if: success()
      run: echo "Live at https://ravari.in"

    - name: Failure
      if: failure()
      run: echo "Deployment failed — check logs above"

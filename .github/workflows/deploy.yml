name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        CI=false npm run build

    - name: Upload build to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 65002
        source: "frontend/build/*"
        target: "/home/${{ secrets.HOSTINGER_USER }}/nodejs/frontend/build/"

    - name: Verify deployment
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 65002
        command_timeout: 2m
        script: |
          echo "=== Files in frontend/build ==="
          ls /home/${{ secrets.HOSTINGER_USER }}/nodejs/frontend/build/
          echo "=== index.html title ==="
          grep -o '<title>[^<]*</title>' /home/${{ secrets.HOSTINGER_USER }}/nodejs/frontend/build/index.html
          echo "=== CSS file ==="
          ls /home/${{ secrets.HOSTINGER_USER }}/nodejs/frontend/build/static/css/

    - name: Done
      if: success()
      run: echo "Live at https://ravari.in"

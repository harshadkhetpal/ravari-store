name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        CI=false npm run build

    - name: Clear old build from server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 65002
        script: rm -rf /home/${{ secrets.HOSTINGER_USER }}/nodejs/frontend/build

    - name: Upload new build to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 65002
        source: "frontend/build"
        target: "/home/${{ secrets.HOSTINGER_USER }}/nodejs/frontend/"

    - name: Restart Node App
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        password: ${{ secrets.HOSTINGER_PASSWORD }}
        port: 65002
        script: |
          export PATH=$PATH:/usr/local/bin:$HOME/.npm-global/bin:$HOME/node_modules/.bin:/usr/bin
          PM2=$(which pm2 2>/dev/null || find $HOME -name pm2 -type f 2>/dev/null | head -1 || echo "")
          echo "PM2 path: $PM2"
          cd /home/${{ secrets.HOSTINGER_USER }}/nodejs
          if [ -n "$PM2" ]; then
            $PM2 stop all || true
            $PM2 delete all || true
            $PM2 start server.js --name ravari-store
            $PM2 save
            echo "Restarted via PM2"
          else
            pkill -f "node server.js" || true
            nohup node server.js > /dev/null 2>&1 &
            echo "Restarted via nohup"
          fi

    - name: Done
      if: success()
      run: echo "Live at https://ravari.in"

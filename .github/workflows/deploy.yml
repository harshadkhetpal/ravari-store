name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        CI=false npm run build

    - name: Upload build to server (with retry)
      run: |
        for i in 1 2 3; do
          echo "=== Upload attempt $i ==="
          sshpass -p "$HOSTINGER_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -P 65002 \
            -r frontend/build \
            "$HOSTINGER_USER@$HOSTINGER_HOST:/home/$HOSTINGER_USER/nodejs/" \
          && echo "Upload succeeded!" && break \
          || { echo "Attempt $i failed, retrying in 20s..."; sleep 20; }
        done
      env:
        HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
        HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
        HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}

    - name: Verify files on server (with retry)
      run: |
        for i in 1 2 3; do
          echo "=== SSH attempt $i ==="
          sshpass -p "$HOSTINGER_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -p 65002 \
            "$HOSTINGER_USER@$HOSTINGER_HOST" \
            "echo '=== Build contents ===' && ls /home/$HOSTINGER_USER/nodejs/frontend/build/ && echo '=== CSS ===' && ls /home/$HOSTINGER_USER/nodejs/frontend/build/static/css/" \
          && break \
          || { echo "Attempt $i failed, retrying in 20s..."; sleep 20; }
        done
      env:
        HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
        HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
        HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}

    - name: Done
      if: success()
      run: echo "Deployed! Live at https://ravari.in"
